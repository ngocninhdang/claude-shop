services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-shop:latest
    container_name: claude-shop-app
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: claude-shop-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
