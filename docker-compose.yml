services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-shop:latest
    container_name: claude-shop-app
    restart: unless-stopped
    env_file:
      - .env.production
    # Bind chỉ ra loopback — host Caddy sẽ reverse proxy tới đây.
    ports:
      - "127.0.0.1:3001:3000"
